  <style>
    html { font-size: 107%; }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html, body { height: 100%; background: #07080f; }
    #root { height: 100%; }
    ::-webkit-scrollbar { width: 5px; height: 5px; }
    ::-webkit-scrollbar-track { background: #07080f; }
    ::-webkit-scrollbar-thumb { background: #1a2535; border-radius: 3px; }
    ::-webkit-scrollbar-thumb:hover { background: #2a4060; }
    input[type=number]::-webkit-inner-spin-button,
    input[type=number]::-webkit-outer-spin-button { opacity: 0.4; }
    select option { background: #0c1118; color: #c8daf0; }
    nav::-webkit-scrollbar { display: none; }
    * { -webkit-font-smoothing: antialiased; }
  </style>
