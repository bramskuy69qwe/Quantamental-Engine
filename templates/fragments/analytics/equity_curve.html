<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px;">
    <div class="lbl" style="margin-bottom:0;">Equity Curve — {{ period_label }}</div>

    <!-- Timeframe buttons -->
    <div style="display:flex;gap:4px;flex-wrap:wrap;">
      {% for tf, label in [('1W','1W'),('2W','2W'),('1M','1M'),('3M','3M'),('6M','6M'),('1Y','1Y'),('all','All')] %}
      <button onclick="reloadEquity('{{ tf }}')"
              id="eq-tf-{{ tf }}"
              class="preset-btn {{ 'active' if tf == active_tf else '' }}"
              style="font-size:.66rem;">{{ label }}</button>
      {% endfor %}
    </div>

    <!-- Display toggles -->
    <div style="display:flex;gap:12px;align-items:center;">
      <label style="display:flex;align-items:center;gap:4px;font-size:.72rem;color:var(--sub);cursor:pointer;">
        <input type="checkbox" id="eq-log-scale" onchange="toggleLogScale()"
               {% if log_scale %}checked{% endif %}>
        Log scale
      </label>
      <label style="display:flex;align-items:center;gap:4px;font-size:.72rem;color:var(--sub);cursor:pointer;">
        <input type="checkbox" id="eq-show-dd" onchange="toggleDrawdown()"
               {% if show_dd %}checked{% endif %}>
        Drawdown %
      </label>
    </div>
  </div>

  {% if candles %}
  <!-- Live OHLC + Change + Range stats bar -->
  <div id="eq-ohlc-stats"
       style="display:flex;flex-wrap:wrap;gap:12px 16px;font-size:.72rem;font-family:var(--font-mono);margin-bottom:8px;padding:0 2px;user-select:none;min-height:1.25rem;">
  </div>
  <div id="equity-chart"></div>
  {% else %}
  <div style="color:var(--muted);font-size:.78rem;padding:40px 0;text-align:center;">No equity data found for this period.</div>
  {% endif %}
</div>

<script>
function reloadEquity(tf) {
  const log = document.getElementById('eq-log-scale')?.checked ? '&log=1' : '';
  const dd  = document.getElementById('eq-show-dd')?.checked   ? '&dd=1'  : '';
  htmx.ajax('GET', '/fragments/analytics/equity_curve?tf=' + tf + log + dd,
            { target: '#analytics-content', swap: 'innerHTML' });
}
function toggleLogScale() { reloadEquity('{{ active_tf }}'); }
function toggleDrawdown()  { reloadEquity('{{ active_tf }}'); }
</script>

{% if candles %}
<script>
(function() {
  const raw      = {{ candles | tojson }};
  const showDD   = {{ 'true' if show_dd   else 'false' }};
  const logScale = {{ 'true' if log_scale else 'false' }};

  const halfMs = raw.length >= 2 ? Math.round((raw[1].x - raw[0].x) / 2) : 0;

  function fmtTs(ms) {
    const d = new Date(ms);
    return d.toLocaleDateString('en', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function fmt(v)    { return '$' + v.toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmtAbs(v) { return '$' + Math.abs(v).toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

  function renderStats(c) {
    const chg       = c.c - c.o;
    const chgPct    = c.o !== 0 ? (chg / c.o) * 100 : 0;
    const rng       = c.h - c.l;
    const rngPct    = c.l !== 0 ? (rng / c.l) * 100 : 0;
    const cf        = c.cf || 0;
    const adjChg    = chg - cf;
    const adjChgPct = c.o !== 0 ? (adjChg / c.o) * 100 : 0;
    const sign      = chg >= 0 ? '+' : '-';
    const adjSign   = adjChg >= 0 ? '+' : '-';
    const cfSign    = cf >= 0 ? '+' : '-';
    const chgCls    = chg >= 0 ? 'color:#00c855' : 'color:#e83535';
    const adjCls    = adjChg >= 0 ? 'color:#00c855' : 'color:#e83535';
    const cfCls     = cf >= 0 ? 'color:#3c8ff5' : 'color:#e89020';
    document.getElementById('eq-ohlc-stats').innerHTML =
      `<span><span style="color:var(--muted)">O</span> <span style="color:var(--text)">${fmt(c.o)}</span></span>` +
      `<span><span style="color:var(--muted)">H</span> <span style="color:#00c855">${fmt(c.h)}</span></span>` +
      `<span><span style="color:var(--muted)">L</span> <span style="color:#e83535">${fmt(c.l)}</span></span>` +
      `<span><span style="color:var(--muted)">C</span> <span style="color:var(--text)">${fmt(c.c)}</span></span>` +
      `<span><span style="color:var(--muted)">Chg</span> <span style="${chgCls}">${sign}${fmtAbs(chg)} (${sign}${Math.abs(chgPct).toFixed(2)}%)</span></span>` +
      `<span><span style="color:var(--muted)">Range</span> <span style="color:var(--text)">${fmt(rng)} (${rngPct.toFixed(2)}%)</span></span>` +
      `<span><span style="color:var(--muted)">CF</span> <span style="${cfCls}">${cfSign}${fmtAbs(cf)}</span></span>` +
      `<span><span style="color:var(--muted)">Adj Chg</span> <span style="${adjCls}">${adjSign}${fmtAbs(adjChg)} (${adjSign}${Math.abs(adjChgPct).toFixed(2)}%)</span></span>`;
  }
  if (raw.length) renderStats(raw[raw.length - 1]);

  let runningPeak = -Infinity;
  const ddData = raw.map(c => {
    if (c.c > runningPeak) runningPeak = c.c;
    const dd = runningPeak > 0 ? -((runningPeak - c.c) / runningPeak) * 100 : 0;
    return { x: c.x + halfMs, y: parseFloat(dd.toFixed(3)) };
  });

  const eqFmt  = v => '$' + v.toLocaleString('en', { maximumFractionDigits: 0 });
  const eqLabels = { formatter: eqFmt, style: { fontSize: '11px' } };
  const ddLabels = { formatter: v => Math.abs(v).toFixed(1) + '%', style: { fontSize: '11px', colors: ['#e83535'] } };

  function buildEqAxis(lo, hi) {
    if (logScale) {
      return { logarithmic: true, forceNiceScale: true, labels: eqLabels };
    }
    const pad = Math.max((hi - lo) * 0.04, 1);
    return { min: lo - pad, max: hi + pad, forceNiceScale: false, labels: eqLabels };
  }

  function buildDdAxis(visibleDd) {
    const ddMin = visibleDd.length ? Math.min(...visibleDd.map(d => d.y)) : -10;
    const pad   = Math.abs(ddMin) * 0.1 || 1;
    return { opposite: true, max: 0, min: ddMin - pad, forceNiceScale: false, labels: ddLabels };
  }

  function fitY(visibleRaw) {
    if (!visibleRaw.length) return;
    const lo  = Math.min(...visibleRaw.map(c => c.l));
    const hi  = Math.max(...visibleRaw.map(c => c.h));
    const eqY = buildEqAxis(lo, hi);
    if (!showDD) { chart.updateOptions({ yaxis: eqY }, false, false); return; }
    const xSet = new Set(visibleRaw.map(c => c.x));
    const visDd = ddData.filter(d => xSet.has(d.x - halfMs));
    chart.updateOptions({ yaxis: [eqY, buildDdAxis(visDd)] }, false, false);
  }

  const yMin = Math.min(...raw.map(c => c.l));
  const yMax = Math.max(...raw.map(c => c.h));

  const candleSeries = { name: 'Equity', type: 'candlestick',
    data: raw.map(c => ({ x: c.x + halfMs, y: [c.o, c.h, c.l, c.c] })) };
  const ddSeries = { name: 'Drawdown %', type: 'line', data: ddData };
  const series = showDD ? [candleSeries, ddSeries] : [candleSeries];

  const opts = {
    chart: {
      type: 'candlestick', height: 360, background: 'transparent', foreColor: '#96b4d0',
      toolbar: { show: true, tools: { download: true, zoom: true, pan: true, reset: true } },
      zoom: { enabled: true }, animations: { enabled: false },
      events: {
        dataPointMouseEnter: (_evt, _ctx, cfg) => {
          if (cfg.seriesIndex === 0 && raw[cfg.dataPointIndex]) renderStats(raw[cfg.dataPointIndex]);
        },
        mouseLeave: () => { if (raw.length) renderStats(raw[raw.length - 1]); },
        zoomed: (_ctx, { xaxis }) => {
          if (!xaxis || xaxis.min == null) return;
          const vis = raw.filter(c => (c.x + halfMs) >= xaxis.min && (c.x + halfMs) <= xaxis.max);
          if (vis.length) fitY(vis);
        },
        scrolled: (_ctx, { xaxis }) => {
          if (!xaxis || xaxis.min == null) return;
          const vis = raw.filter(c => (c.x + halfMs) >= xaxis.min && (c.x + halfMs) <= xaxis.max);
          if (vis.length) fitY(vis);
        },
      },
    },
    theme: { mode: 'dark' },
    series,
    xaxis: {
      type: 'datetime', datetimeUTC: false,
      labels: {
        rotate: -45, hideOverlappingLabels: true,
        style: { fontSize: '10px' },
        datetimeFormatter: { year: 'yyyy', month: "MMM 'yy", day: 'MMM dd', hour: 'MMM dd HH:mm' },
      },
    },
    yaxis: showDD ? [buildEqAxis(yMin, yMax), buildDdAxis(ddData)] : buildEqAxis(yMin, yMax),
    plotOptions: {
      candlestick: { colors: { upward: '#00c855', downward: '#e83535' }, wick: { useFillColor: true } },
    },
    stroke: { width: [1, 1.5], curve: 'smooth' },
    colors: ['transparent', '#e83535'],
    grid: { borderColor: '#18253a' },
    legend: { show: false },
    tooltip: {
      theme: 'dark',
      custom: ({ seriesIndex, dataPointIndex }) => {
        if (seriesIndex !== 0) return '';
        const c = raw[dataPointIndex];
        if (!c) return '';
        const chg       = c.c - c.o;
        const chgPct    = c.o !== 0 ? (chg / c.o) * 100 : 0;
        const rng       = c.h - c.l;
        const rngPct    = c.l !== 0 ? (rng / c.l) * 100 : 0;
        const cf        = c.cf || 0;
        const adjChg    = chg - cf;
        const adjChgPct = c.o !== 0 ? (adjChg / c.o) * 100 : 0;
        const sign      = chg >= 0 ? '+' : '-';
        const adjSign   = adjChg >= 0 ? '+' : '-';
        const cfSign    = cf >= 0 ? '+' : '-';
        const chgCol    = chg >= 0 ? '#00c855' : '#e83535';
        const adjCol    = adjChg >= 0 ? '#00c855' : '#e83535';
        const cfCol     = cf >= 0 ? '#3c8ff5' : '#e89020';
        const ddVal     = showDD ? ddData[dataPointIndex]?.y ?? 0 : null;
        const row = (lbl, val, col) =>
          `<div style="display:flex;justify-content:space-between;gap:16px">` +
          `<span style="color:#526a88">${lbl}</span>` +
          `<span style="color:${col || '#e8f2ff'}">${val}</span></div>`;
        return `<div style="padding:10px 12px;background:#0c1118;border:1px solid #18253a;font-size:11px;font-family:JetBrains Mono,monospace;line-height:1.9;min-width:200px">` +
          `<div style="color:#526a88;margin-bottom:2px">${fmtTs(c.x)}</div>` +
          row('Open',  fmt(c.o)) +
          row('High',  fmt(c.h), '#00c855') +
          row('Low',   fmt(c.l), '#e83535') +
          row('Close', fmt(c.c)) +
          `<div style="border-top:1px solid #18253a;margin:4px 0"></div>` +
          row('Change', `${sign}${fmtAbs(chg)} (${sign}${Math.abs(chgPct).toFixed(2)}%)`, chgCol) +
          row('Range',  `${fmt(rng)} (${rngPct.toFixed(2)}%)`) +
          `<div style="border-top:1px solid #18253a;margin:4px 0"></div>` +
          row('Cashflow', `${cfSign}${fmtAbs(cf)}`, cfCol) +
          row('Adj Chg',  `${adjSign}${fmtAbs(adjChg)} (${adjSign}${Math.abs(adjChgPct).toFixed(2)}%)`, adjCol) +
          (ddVal !== null ? row('Drawdown', Math.abs(ddVal).toFixed(2) + '%', '#e83535') : '') +
          `</div>`;
      },
    },
    dataLabels: { enabled: false },
  };

  const chart = new ApexCharts(document.querySelector('#equity-chart'), opts);
  chart.render();
})();
</script>
{% endif %}
