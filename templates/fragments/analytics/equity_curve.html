<div class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px;">
    <div class="lbl" style="margin-bottom:0;">Equity Curve — {{ period_label }}</div>

    <!-- Timeframe buttons -->
    <div style="display:flex;gap:4px;flex-wrap:wrap;">
      {% for tf, label in [('1W','1W'),('2W','2W'),('1M','1M'),('3M','3M'),('6M','6M'),('1Y','1Y'),('all','All')] %}
      <button onclick="reloadEquity('{{ tf }}')"
              id="eq-tf-{{ tf }}"
              class="preset-btn {{ 'active' if tf == active_tf else '' }}"
              style="font-size:.66rem;">{{ label }}</button>
      {% endfor %}
    </div>

    <!-- Display toggles -->
    <div style="display:flex;gap:12px;align-items:center;">
      <label style="display:flex;align-items:center;gap:4px;font-size:.72rem;color:var(--sub);cursor:pointer;">
        <input type="checkbox" id="eq-log-scale" onchange="toggleLogScale()"
               {% if log_scale %}checked{% endif %}>
        Log scale
      </label>
      <label style="display:flex;align-items:center;gap:4px;font-size:.72rem;color:var(--sub);cursor:pointer;">
        <input type="checkbox" id="eq-show-dd" onchange="toggleDrawdown()"
               {% if show_dd %}checked{% endif %}>
        Drawdown %
      </label>
    </div>
  </div>

  {% if candles %}
  <!-- Live OHLC + Change + Range stats bar -->
  <div id="eq-ohlc-stats"
       style="display:flex;flex-wrap:wrap;gap:12px 16px;font-size:.72rem;font-family:var(--font-mono);margin-bottom:8px;padding:0 2px;user-select:none;min-height:1.25rem;">
  </div>
  <div id="equity-chart" style="height:360px;"></div>
  {% else %}
  <div style="color:var(--muted);font-size:.78rem;padding:40px 0;text-align:center;">No equity data found for this period.</div>
  {% endif %}
</div>

<script>
function reloadEquity(tf) {
  const log = document.getElementById('eq-log-scale')?.checked ? '&log=1' : '';
  const dd  = document.getElementById('eq-show-dd')?.checked   ? '&dd=1'  : '';
  htmx.ajax('GET', '/fragments/analytics/equity_curve?tf=' + tf + log + dd,
            { target: '#analytics-content', swap: 'innerHTML' });
}
function toggleLogScale() { reloadEquity('{{ active_tf }}'); }
function toggleDrawdown()  { reloadEquity('{{ active_tf }}'); }
</script>

{% if candles %}
<script>
(function() {
  var raw      = {{ candles | tojson }};
  var showDD   = {{ 'true' if show_dd   else 'false' }};
  var logScale = {{ 'true' if log_scale else 'false' }};

  function fmtTs(ms) {
    var d = new Date(ms);
    return d.toLocaleDateString('en', { year: 'numeric', month: 'short', day: 'numeric' });
  }

  function fmt(v)    { return '$' + v.toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmtAbs(v) { return '$' + Math.abs(v).toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

  function renderStats(c) {
    var chg       = c.c - c.o;
    var chgPct    = c.o !== 0 ? (chg / c.o) * 100 : 0;
    var rng       = c.h - c.l;
    var rngPct    = c.l !== 0 ? (rng / c.l) * 100 : 0;
    var cf        = c.cf || 0;
    var adjChg    = chg - cf;
    var adjChgPct = c.o !== 0 ? (adjChg / c.o) * 100 : 0;
    var sign      = chg >= 0 ? '+' : '-';
    var adjSign   = adjChg >= 0 ? '+' : '-';
    var cfSign    = cf >= 0 ? '+' : '-';
    var chgCls    = chg >= 0 ? 'color:#00c855' : 'color:#e83535';
    var adjCls    = adjChg >= 0 ? 'color:#00c855' : 'color:#e83535';
    var cfCls     = cf >= 0 ? 'color:#3c8ff5' : 'color:#e89020';
    document.getElementById('eq-ohlc-stats').innerHTML =
      '<span><span style="color:var(--muted)">O</span> <span style="color:var(--text)">' + fmt(c.o) + '</span></span>' +
      '<span><span style="color:var(--muted)">H</span> <span style="color:#00c855">' + fmt(c.h) + '</span></span>' +
      '<span><span style="color:var(--muted)">L</span> <span style="color:#e83535">' + fmt(c.l) + '</span></span>' +
      '<span><span style="color:var(--muted)">C</span> <span style="color:var(--text)">' + fmt(c.c) + '</span></span>' +
      '<span><span style="color:var(--muted)">Chg</span> <span style="' + chgCls + '">' + sign + fmtAbs(chg) + ' (' + sign + Math.abs(chgPct).toFixed(2) + '%)</span></span>' +
      '<span><span style="color:var(--muted)">Range</span> <span style="color:var(--text)">' + fmt(rng) + ' (' + rngPct.toFixed(2) + '%)</span></span>' +
      '<span><span style="color:var(--muted)">CF</span> <span style="' + cfCls + '">' + cfSign + fmtAbs(cf) + '</span></span>' +
      '<span><span style="color:var(--muted)">Adj Chg</span> <span style="' + adjCls + '">' + adjSign + fmtAbs(adjChg) + ' (' + adjSign + Math.abs(adjChgPct).toFixed(2) + '%)</span></span>';
  }
  if (raw.length) renderStats(raw[raw.length - 1]);

  // Compute drawdown series
  var runningPeak = -Infinity;
  var ddValues = raw.map(function(c) {
    if (c.c > runningPeak) runningPeak = c.c;
    var dd = runningPeak > 0 ? -((runningPeak - c.c) / runningPeak) * 100 : 0;
    return parseFloat(dd.toFixed(3));
  });

  // Category labels (timestamps)
  var categoryData = raw.map(function(c) { return fmtTs(c.x); });
  // Candlestick data: [open, close, low, high]
  var candleData = raw.map(function(c) { return [c.o, c.c, c.l, c.h]; });

  // Build Y-axes
  var yAxes = [{
    type: logScale ? 'log' : 'value',
    scale: true,
    position: 'right',
    axisLabel: { formatter: function(v) { return '$' + v.toLocaleString('en', { maximumFractionDigits: 0 }); } },
  }];

  var seriesList = [{
    type: 'candlestick',
    name: 'Equity',
    data: candleData,
    itemStyle: {
      color: '#00c855',
      color0: '#e83535',
      borderColor: '#00c855',
      borderColor0: '#e83535',
    },
  }];

  if (showDD) {
    yAxes.push({
      type: 'value',
      position: 'left',
      max: 0,
      axisLabel: { formatter: function(v) { return Math.abs(v).toFixed(1) + '%'; }, color: '#e83535' },
      splitLine: { show: false },
    });
    seriesList.push({
      type: 'line',
      name: 'Drawdown %',
      data: ddValues,
      yAxisIndex: 1,
      smooth: true,
      symbol: 'none',
      lineStyle: { width: 1.5, color: '#e83535' },
      areaStyle: { color: QE.areaGradient('#e83535', 0.15, 0.02) },
    });
  }

  var option = {
    grid: { top: 20, bottom: 50, left: showDD ? 55 : 20, right: 65 },
    xAxis: {
      type: 'category',
      data: categoryData,
      axisLabel: { rotate: -45, fontSize: 10 },
    },
    yAxis: yAxes,
    series: seriesList,
    dataZoom: [
      { type: 'inside', xAxisIndex: 0 },
      { type: 'slider', xAxisIndex: 0, height: 20, bottom: 5 },
    ],
    toolbox: {
      feature: {
        saveAsImage: { title: 'Save' },
        dataZoom: { title: { zoom: 'Zoom', back: 'Reset' } },
        restore: { title: 'Restore' },
      },
    },
    tooltip: {
      trigger: 'axis',
      axisPointer: { type: 'cross' },
      formatter: function(params) {
        // Find candlestick param
        var cp = null;
        for (var i = 0; i < params.length; i++) {
          if (params[i].seriesType === 'candlestick') { cp = params[i]; break; }
        }
        if (!cp) return '';
        var idx = cp.dataIndex;
        var c = raw[idx];
        if (!c) return '';
        var chg       = c.c - c.o;
        var chgPct    = c.o !== 0 ? (chg / c.o) * 100 : 0;
        var rng       = c.h - c.l;
        var rngPct    = c.l !== 0 ? (rng / c.l) * 100 : 0;
        var cf        = c.cf || 0;
        var adjChg    = chg - cf;
        var adjChgPct = c.o !== 0 ? (adjChg / c.o) * 100 : 0;
        var sign      = chg >= 0 ? '+' : '-';
        var adjSign   = adjChg >= 0 ? '+' : '-';
        var cfSign    = cf >= 0 ? '+' : '-';
        var chgCol    = chg >= 0 ? '#00c855' : '#e83535';
        var adjCol    = adjChg >= 0 ? '#00c855' : '#e83535';
        var cfCol     = cf >= 0 ? '#3c8ff5' : '#e89020';
        function row(lbl, val, col) {
          return '<div style="display:flex;justify-content:space-between;gap:16px">' +
            '<span style="color:#526a88">' + lbl + '</span>' +
            '<span style="color:' + (col || '#e8f2ff') + '">' + val + '</span></div>';
        }
        var html = '<div style="padding:10px 12px;font-size:11px;font-family:JetBrains Mono,monospace;line-height:1.9;min-width:200px">' +
          '<div style="color:#526a88;margin-bottom:2px">' + fmtTs(c.x) + '</div>' +
          row('Open',  fmt(c.o)) +
          row('High',  fmt(c.h), '#00c855') +
          row('Low',   fmt(c.l), '#e83535') +
          row('Close', fmt(c.c)) +
          '<div style="border-top:1px solid #18253a;margin:4px 0"></div>' +
          row('Change', sign + fmtAbs(chg) + ' (' + sign + Math.abs(chgPct).toFixed(2) + '%)', chgCol) +
          row('Range',  fmt(rng) + ' (' + rngPct.toFixed(2) + '%)') +
          '<div style="border-top:1px solid #18253a;margin:4px 0"></div>' +
          row('Cashflow', cfSign + fmtAbs(cf), cfCol) +
          row('Adj Chg',  adjSign + fmtAbs(adjChg) + ' (' + adjSign + Math.abs(adjChgPct).toFixed(2) + '%)', adjCol);
        if (showDD) {
          html += row('Drawdown', Math.abs(ddValues[idx] || 0).toFixed(2) + '%', '#e83535');
        }
        html += '</div>';
        return html;
      },
    },
    legend: { show: false },
    animation: false,
  };

  var chart = QE.initChart(document.getElementById('equity-chart'), option);

  // Auto-fit Y-axis on zoom
  chart.on('datazoom', function() {
    var opt = chart.getOption();
    var dz = opt.dataZoom[0];
    var startPct = dz.start !== undefined ? dz.start : 0;
    var endPct = dz.end !== undefined ? dz.end : 100;
    var startIdx = Math.floor(startPct / 100 * raw.length);
    var endIdx = Math.ceil(endPct / 100 * raw.length) - 1;
    startIdx = Math.max(0, startIdx);
    endIdx = Math.min(raw.length - 1, endIdx);
    if (endIdx < startIdx) return;
    var visible = raw.slice(startIdx, endIdx + 1);
    if (!visible.length) return;
    var lo = Math.min.apply(null, visible.map(function(c) { return c.l; }));
    var hi = Math.max.apply(null, visible.map(function(c) { return c.h; }));
    var pad = (hi - lo) * 0.04 || 1;
    var yOpt = { yAxis: [{ min: lo - pad, max: hi + pad }] };
    if (showDD) {
      var visDd = ddValues.slice(startIdx, endIdx + 1);
      var ddMin = Math.min.apply(null, visDd);
      var ddPad = Math.abs(ddMin) * 0.1 || 1;
      yOpt.yAxis.push({ min: ddMin - ddPad, max: 0 });
    }
    chart.setOption(yOpt);
  });

  // Hover stats — use axisPointer event so it triggers across full chart area
  chart.on('updateAxisPointer', function(params) {
    var axesInfo = params.axesInfo;
    if (axesInfo && axesInfo.length > 0) {
      var idx = axesInfo[0].value;
      if (idx >= 0 && idx < raw.length) renderStats(raw[idx]);
    }
  });
  chart.getZr().on('globalout', function() {
    if (raw.length) renderStats(raw[raw.length - 1]);
  });
})();
</script>
{% endif %}
