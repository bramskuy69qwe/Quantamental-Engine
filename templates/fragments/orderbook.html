<div class="lbl" style="margin-bottom:8px;">Live Orderbook — {{ ticker }}</div>
<div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;font-family:var(--font-mono);font-size:.72rem;">
  <div>
    <div class="pos-long" style="font-weight:700;margin-bottom:4px;">BIDS</div>
    {% for price, qty in bids %}
    <div style="display:flex;justify-content:space-between;">
      <span class="pos-long">{{ fmt(price, 4) }}</span>
      <span style="color:var(--sub);">{{ fmt(qty, 4) }}</span>
    </div>
    {% endfor %}
  </div>
  <div>
    <div class="pos-short" style="font-weight:700;margin-bottom:4px;">ASKS</div>
    {% for price, qty in asks %}
    <div style="display:flex;justify-content:space-between;">
      <span class="pos-short">{{ fmt(price, 4) }}</span>
      <span style="color:var(--sub);">{{ fmt(qty, 4) }}</span>
    </div>
    {% endfor %}
  </div>
</div>
