<div class="card" style="padding:16px;">

  <!-- Header -->
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px;">
    <div style="display:flex;align-items:center;gap:8px;">
      <span style="font-size:.85rem;font-weight:700;">{{ acct.name }}</span>
      {% if acct.is_active %}
      <span class="badge badge-green">Active</span>
      {% endif %}
      {% set env = acct.get('environment', 'live') %}
      <span style="font-size:.6rem;font-weight:700;padding:2px 6px;border-radius:3px;
                   {% if env == 'live' %}background:rgba(239,68,68,0.15);color:var(--red);
                   {% elif env == 'testnet' %}background:rgba(59,130,246,0.15);color:var(--blue);
                   {% else %}background:rgba(234,179,8,0.15);color:#eab308;{% endif %}">
        {{ env|upper }}
      </span>
    </div>
    <div id="acct-msg" style="font-size:.65rem;"></div>
  </div>

  <form hx-post="/accounts/{{ acct.id }}/update" hx-target="#acct-msg" hx-swap="innerHTML">

    <!-- ── Credentials ───────────────────────────────────────────────── -->
    <div style="margin-bottom:14px;">
      <span class="sec-lbl">Credentials</span>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;">
        <div>
          <label class="lbl">Exchange</label>
          <input type="text" name="exchange" value="{{ acct.exchange }}" style="width:100%;" />
        </div>
        <div>
          <label class="lbl">Market Type</label>
          <select name="market_type" style="width:100%;height:30px;font-size:.7rem;">
            <option value="future" {% if acct.market_type == 'future' %}selected{% endif %}>USD-M Futures</option>
            <option value="spot"   {% if acct.market_type == 'spot'   %}selected{% endif %}>Spot</option>
          </select>
        </div>
        <div>
          <label class="lbl">Environment</label>
          <select name="environment" style="width:100%;height:30px;font-size:.7rem;">
            <option value="live"    {% if env == 'live'    %}selected{% endif %}>Live</option>
            <option value="paper"   {% if env == 'paper'   %}selected{% endif %}>Paper</option>
            <option value="testnet" {% if env == 'testnet' %}selected{% endif %}>Testnet</option>
          </select>
        </div>
        <div>
          <label class="lbl">API Key</label>
          <input type="password" name="api_key" placeholder="Leave blank to keep current" style="width:100%;" />
        </div>
        <div>
          <label class="lbl">API Secret</label>
          <input type="password" name="api_secret" placeholder="Leave blank to keep current" style="width:100%;" />
        </div>
        <div>
          <label class="lbl">Broker Account ID</label>
          <input type="text" name="broker_account_id" value="{{ acct.get('broker_account_id', '') }}" style="width:100%;" />
        </div>
      </div>
      <div style="margin-top:8px;">
        <button type="button" class="btn btn-ghost btn-sm"
                hx-post="/accounts/{{ acct.id }}/test"
                hx-target="#test-result"
                hx-swap="innerHTML">
          Test Connection
        </button>
        <span id="test-result" style="font-size:.65rem;margin-left:8px;"></span>
      </div>
    </div>

    <!-- ── Risk Parameters ───────────────────────────────────────────── -->
    <div style="margin-bottom:14px;">
      <span class="sec-lbl">Risk Parameters</span>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;">
        <div>
          <label class="lbl">Individual Risk / Trade</label>
          <input type="number" name="individual_risk_per_trade" step="0.001" min="0.0001" max="0.10"
                 value="{{ params.individual_risk_per_trade }}" required />
        </div>
        <div>
          <label class="lbl">Max Weekly Loss (%)</label>
          <input type="number" name="max_w_loss_percent" step="0.001" min="0.001" max="0.30"
                 value="{{ params.max_w_loss_percent }}" required />
        </div>
        <div>
          <label class="lbl">Max Drawdown (%)</label>
          <input type="number" name="max_dd_percent" step="0.001" min="0.01" max="0.50"
                 value="{{ params.max_dd_percent }}" required />
        </div>
        <div>
          <label class="lbl">Max Exposure (x equity)</label>
          <input type="number" name="max_exposure" step="0.1" min="0.1" max="20"
                 value="{{ params.max_exposure }}" required />
        </div>
        <div>
          <label class="lbl">Max Open Positions</label>
          <input type="number" name="max_position_count" step="1" min="1" max="100"
                 value="{{ params.max_position_count }}" required />
        </div>
        <div>
          <label class="lbl">Max Correlated Exposure</label>
          <input type="number" name="max_correlated_exposure" step="0.05" min="0.05" max="1.0"
                 value="{{ params.max_correlated_exposure }}" required />
        </div>
        <div>
          <label class="lbl">Auto Export (hours)</label>
          <input type="number" name="auto_export_hours" step="1" min="1" max="168"
                 value="{{ params.auto_export_hours }}" required />
        </div>
      </div>
    </div>

    <!-- ── Thresholds ────────────────────────────────────────────────── -->
    <div style="margin-bottom:14px;">
      <span class="sec-lbl">Soft / Hard Stop Thresholds</span>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;">
        <div>
          <label class="lbl">Weekly Loss Warning</label>
          <input type="number" name="weekly_loss_warning_pct" step="0.01" min="0.50" max="0.99"
                 value="{{ params.weekly_loss_warning_pct }}" />
        </div>
        <div>
          <label class="lbl">Weekly Loss Hard Stop</label>
          <input type="number" name="weekly_loss_limit_pct" step="0.01" min="0.50" max="1.0"
                 value="{{ params.weekly_loss_limit_pct }}" />
        </div>
        <div>
          <label class="lbl">DD Warning</label>
          <input type="number" name="max_dd_warning_pct" step="0.01" min="0.50" max="0.99"
                 value="{{ params.max_dd_warning_pct }}" />
        </div>
        <div>
          <label class="lbl">DD Hard Stop</label>
          <input type="number" name="max_dd_limit_pct" step="0.01" min="0.50" max="1.0"
                 value="{{ params.max_dd_limit_pct }}" />
        </div>
      </div>
    </div>

    <!-- ── Fees ──────────────────────────────────────────────────────── -->
    <div style="margin-bottom:14px;">
      <span class="sec-lbl">Fees</span>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;">
        <div>
          <label class="lbl">Maker Fee</label>
          <input type="number" name="maker_fee" step="0.00001" min="0" max="0.01"
                 value="{{ acct.get('maker_fee', 0.0002) }}" />
          <div style="font-size:.58rem;color:var(--muted);margin-top:2px;">Auto-fetched on Test Connection</div>
        </div>
        <div>
          <label class="lbl">Taker Fee</label>
          <input type="number" name="taker_fee" step="0.00001" min="0" max="0.01"
                 value="{{ acct.get('taker_fee', 0.0005) }}" />
        </div>
      </div>
    </div>

    <!-- ── Preferences ────────────────────────────────────────────────── -->
    {% if settings %}
    <div style="margin-bottom:14px;">
      <span class="sec-lbl">Preferences</span>
      <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(200px,1fr));gap:8px;">
        <div>
          <label class="lbl">Default Analytics Period</label>
          <select name="analytics_default_period" style="width:100%;">
            {% set periods = [
              ('monthly',     'Monthly (This Month)'),
              ('weekly',      'Weekly (This Week)'),
              ('quarterly',   'Quarterly'),
              ('yearly',      'Yearly'),
              ('rolling_30d', 'Rolling 30 Days'),
              ('rolling_90d', 'Rolling 90 Days'),
              ('all_time',    'All Time'),
            ] %}
            {% for val, label in periods %}
            <option value="{{ val }}" {% if settings.analytics_default_period == val %}selected{% endif %}>{{ label }}</option>
            {% endfor %}
          </select>
        </div>
      </div>
    </div>
    {% endif %}

    <!-- ── Actions ───────────────────────────────────────────────────── -->
    <div style="display:flex;gap:8px;align-items:center;padding-top:8px;border-top:1px solid var(--border);">
      <button type="submit" class="btn btn-primary btn-sm">Save</button>
      {% if not acct.is_active %}
      <button type="button" class="btn btn-sm"
              hx-post="/accounts/{{ acct.id }}/activate"
              hx-swap="none"
              onclick="if(!confirm('Activate this account? This will restart the exchange connection.')) event.preventDefault();">
        Activate
      </button>
      {% endif %}
      <button type="button" class="btn btn-ghost btn-sm" style="color:var(--red);margin-left:auto;"
              hx-delete="/accounts/{{ acct.id }}"
              hx-swap="none"
              hx-confirm="Delete {{ acct.name }}? This cannot be undone.">
        Delete
      </button>
    </div>

  </form>
</div>
