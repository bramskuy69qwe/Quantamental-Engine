<div id="ohlc-widget" class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px;">
    <div class="lbl" style="margin-bottom:0;">Equity Curve (OHLC)</div>
    <div style="display:flex;gap:4px;">
      {% for tf, label in [('1h','1H'),('4h','4H'),('1d','1D'),('1w','1W')] %}
      <button onclick="reloadOhlc('{{ tf }}')"
              id="ohlc-tf-{{ tf }}"
              class="preset-btn {{ 'active' if tf == active_tf else '' }}"
              style="font-size:.66rem;">{{ label }}</button>
      {% endfor %}
    </div>
    <span style="color:var(--muted);font-size:.66rem;">Last 100 candles · from account snapshots</span>
  </div>

  {% if candles %}
  <div id="ohlc-stats"
       style="display:flex;flex-wrap:wrap;gap:12px 16px;font-size:.72rem;font-family:var(--font-mono);margin-bottom:8px;padding:0 2px;user-select:none;min-height:1.25rem;">
  </div>
  <div id="ohlc-chart" style="height:280px;"></div>
  {% else %}
  <div style="color:var(--muted);font-size:.78rem;padding:32px 0;text-align:center;">No snapshot data available yet.</div>
  {% endif %}
</div>

<script>
function reloadOhlc(tf) {
  htmx.ajax('GET', '/fragments/dashboard/equity_ohlc?tf=' + tf,
            { target: '#ohlc-widget', swap: 'outerHTML' });
}

{% if candles %}
(function() {
  var raw = {{ candles | tojson }};
  var TF  = '{{ active_tf }}';

  function fmtLabel(ms) {
    var d  = new Date(ms);
    var mo = d.toLocaleString('en', { month: 'short' });
    var dd = String(d.getDate()).padStart(2, '0');
    if (TF === '1d' || TF === '1w') return mo + ' ' + dd;
    var hh = String(d.getHours()).padStart(2, '0');
    var mm = String(d.getMinutes()).padStart(2, '0');
    return mo + ' ' + dd + ' ' + hh + ':' + mm;
  }

  function fmt(v)    { return '$' + v.toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmtAbs(v) { return '$' + Math.abs(v).toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

  function renderStats(c) {
    var chg       = c.c - c.o;
    var chgPct    = c.o !== 0 ? (chg / c.o) * 100 : 0;
    var rng       = c.h - c.l;
    var rngPct    = c.l !== 0 ? (rng / c.l) * 100 : 0;
    var cf        = c.cf || 0;
    var adjChg    = chg - cf;
    var adjChgPct = c.o !== 0 ? (adjChg / c.o) * 100 : 0;
    var sign      = chg >= 0 ? '+' : '-';
    var adjSign   = adjChg >= 0 ? '+' : '-';
    var cfSign    = cf >= 0 ? '+' : '-';
    var chgCol    = chg >= 0 ? 'var(--green)' : 'var(--red)';
    var adjCol    = adjChg >= 0 ? 'var(--green)' : 'var(--red)';
    var cfCol     = cf >= 0 ? 'var(--blue)' : 'var(--amber)';
    document.getElementById('ohlc-stats').innerHTML =
      '<span><span style="color:var(--muted)">O</span> <span style="color:var(--text)">' + fmt(c.o) + '</span></span>' +
      '<span><span style="color:var(--muted)">H</span> <span style="color:var(--green)">' + fmt(c.h) + '</span></span>' +
      '<span><span style="color:var(--muted)">L</span> <span style="color:var(--red)">' + fmt(c.l) + '</span></span>' +
      '<span><span style="color:var(--muted)">C</span> <span style="color:var(--text)">' + fmt(c.c) + '</span></span>' +
      '<span><span style="color:var(--muted)">Chg</span> <span style="color:' + chgCol + '">' + sign + fmtAbs(chg) + ' (' + sign + Math.abs(chgPct).toFixed(2) + '%)</span></span>' +
      '<span><span style="color:var(--muted)">Range</span> <span style="color:var(--text)">' + fmt(rng) + ' (' + rngPct.toFixed(2) + '%)</span></span>' +
      '<span><span style="color:var(--muted)">CF</span> <span style="color:' + cfCol + '">' + cfSign + fmtAbs(cf) + '</span></span>' +
      '<span><span style="color:var(--muted)">Adj Chg</span> <span style="color:' + adjCol + '">' + adjSign + fmtAbs(adjChg) + ' (' + adjSign + Math.abs(adjChgPct).toFixed(2) + '%)</span></span>';
  }

  if (raw.length) renderStats(raw[raw.length - 1]);

  // ECharts candlestick: [open, close, low, high]
  var categoryData = raw.map(function(c) { return fmtLabel(c.x); });
  var values = raw.map(function(c) { return [c.o, c.c, c.l, c.h]; });

  var option = {
    grid: { top: 20, bottom: 50, left: 20, right: 65 },
    xAxis: {
      type: 'category',
      data: categoryData,
      axisLabel: { rotate: -45, fontSize: 10 },
    },
    yAxis: {
      type: 'value',
      scale: true,
      position: 'right',
      axisLabel: { formatter: function(v) { return '$' + v.toLocaleString('en', { maximumFractionDigits: 2 }); } },
    },
    series: [{
      type: 'candlestick',
      data: values,
      itemStyle: {
        color: '#00c855',        // bullish body
        color0: '#e83535',       // bearish body
        borderColor: '#00c855',  // bullish border/wick
        borderColor0: '#e83535', // bearish border/wick
      },
    }],
    dataZoom: [
      { type: 'inside', xAxisIndex: 0 },
      { type: 'slider', xAxisIndex: 0, height: 20, bottom: 5 },
    ],
    toolbox: {
      feature: {
        saveAsImage: { title: 'Save' },
        dataZoom: { title: { zoom: 'Zoom', back: 'Reset' } },
        restore: { title: 'Restore' },
      },
    },
    tooltip: {
      trigger: 'axis',
      axisPointer: { type: 'cross' },
      formatter: function(params) {
        var p = params[0];
        if (!p) return '';
        var idx = p.dataIndex;
        var c = raw[idx];
        if (!c) return '';
        var chg       = c.c - c.o;
        var chgPct    = c.o !== 0 ? (chg / c.o) * 100 : 0;
        var rng       = c.h - c.l;
        var rngPct    = c.l !== 0 ? (rng / c.l) * 100 : 0;
        var cf        = c.cf || 0;
        var adjChg    = chg - cf;
        var adjChgPct = c.o !== 0 ? (adjChg / c.o) * 100 : 0;
        var sign      = chg >= 0 ? '+' : '-';
        var adjSign   = adjChg >= 0 ? '+' : '-';
        var cfSign    = cf >= 0 ? '+' : '-';
        var chgCol    = chg >= 0 ? '#00c855' : '#e83535';
        var adjCol    = adjChg >= 0 ? '#00c855' : '#e83535';
        var cfCol     = cf >= 0 ? '#3c8ff5' : '#e89020';
        function row(label, val, col) {
          return '<div style="display:flex;justify-content:space-between;gap:16px">' +
            '<span style="color:#526a88">' + label + '</span>' +
            '<span style="color:' + (col || '#e8f2ff') + '">' + val + '</span></div>';
        }
        return '<div style="padding:10px 12px;font-size:11px;font-family:JetBrains Mono,monospace;line-height:1.9;min-width:200px">' +
          row('Open',  fmt(c.o)) +
          row('High',  fmt(c.h), '#00c855') +
          row('Low',   fmt(c.l), '#e83535') +
          row('Close', fmt(c.c)) +
          '<div style="border-top:1px solid #18253a;margin:4px 0"></div>' +
          row('Change',   sign + fmtAbs(chg) + ' (' + sign + Math.abs(chgPct).toFixed(2) + '%)', chgCol) +
          row('Range',    fmt(rng) + ' (' + rngPct.toFixed(2) + '%)') +
          '<div style="border-top:1px solid #18253a;margin:4px 0"></div>' +
          row('Cashflow', cfSign + fmtAbs(cf), cfCol) +
          row('Adj Chg',  adjSign + fmtAbs(adjChg) + ' (' + adjSign + Math.abs(adjChgPct).toFixed(2) + '%)', adjCol) +
          '</div>';
      },
    },
    animation: false,
  };

  var chart = QE.initChart(document.getElementById('ohlc-chart'), option);

  // Auto-fit Y-axis on zoom
  chart.on('datazoom', function() {
    var opt = chart.getOption();
    var dz = opt.dataZoom[0];
    var startPct = dz.start !== undefined ? dz.start : 0;
    var endPct = dz.end !== undefined ? dz.end : 100;
    var startIdx = Math.floor(startPct / 100 * raw.length);
    var endIdx = Math.ceil(endPct / 100 * raw.length) - 1;
    startIdx = Math.max(0, startIdx);
    endIdx = Math.min(raw.length - 1, endIdx);
    if (endIdx < startIdx) return;
    var visible = raw.slice(startIdx, endIdx + 1);
    if (!visible.length) return;
    var lo = Math.min.apply(null, visible.map(function(c) { return c.l; }));
    var hi = Math.max.apply(null, visible.map(function(c) { return c.h; }));
    var pad = (hi - lo) * 0.04;
    chart.setOption({ yAxis: { min: lo - pad, max: hi + pad } });
  });

  // Hover stats — use axisPointer event so it triggers across full chart area
  chart.on('updateAxisPointer', function(params) {
    var axesInfo = params.axesInfo;
    if (axesInfo && axesInfo.length > 0) {
      var idx = axesInfo[0].value;
      if (idx >= 0 && idx < raw.length) renderStats(raw[idx]);
    }
  });
  chart.getZr().on('globalout', function() {
    if (raw.length) renderStats(raw[raw.length - 1]);
  });
})();
{% endif %}
</script>
