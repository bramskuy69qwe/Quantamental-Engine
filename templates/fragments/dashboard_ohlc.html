<div id="ohlc-widget" class="card">
  <div style="display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;margin-bottom:8px;">
    <div class="lbl" style="margin-bottom:0;">Equity Curve (OHLC)</div>
    <div style="display:flex;gap:4px;">
      {% for tf, label in [('1h','1H'),('4h','4H'),('1d','1D'),('1w','1W')] %}
      <button onclick="reloadOhlc('{{ tf }}')"
              id="ohlc-tf-{{ tf }}"
              class="preset-btn {{ 'active' if tf == active_tf else '' }}"
              style="font-size:.66rem;">{{ label }}</button>
      {% endfor %}
    </div>
    <span style="color:var(--muted);font-size:.66rem;">Last 100 candles · from account snapshots</span>
  </div>

  {% if candles %}
  <div id="ohlc-stats"
       style="display:flex;flex-wrap:wrap;gap:12px 16px;font-size:.72rem;font-family:var(--font-mono);margin-bottom:8px;padding:0 2px;user-select:none;min-height:1.25rem;">
  </div>
  <div id="ohlc-chart"></div>
  {% else %}
  <div style="color:var(--muted);font-size:.78rem;padding:32px 0;text-align:center;">No snapshot data available yet.</div>
  {% endif %}
</div>

<script>
function reloadOhlc(tf) {
  htmx.ajax('GET', '/fragments/dashboard/equity_ohlc?tf=' + tf,
            { target: '#ohlc-widget', swap: 'outerHTML' });
}

{% if candles %}
(function() {
  const raw = {{ candles | tojson }};
  const TF  = '{{ active_tf }}';

  // ── Label formatter ──────────────────────────────────────────────────────
  function fmtLabel(ms) {
    const d  = new Date(ms);
    const mo = d.toLocaleString('en', { month: 'short' });
    const dd = String(d.getDate()).padStart(2, '0');
    if (TF === '1d' || TF === '1w') return mo + ' ' + dd;
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    return mo + ' ' + dd + ' ' + hh + ':' + mm;
  }

  const yAxisFormatter = v => '$' + v.toLocaleString('en', { maximumFractionDigits: 2 });
  const yAxisLabels    = { formatter: yAxisFormatter, style: { fontSize: '11px' } };

  function fitY(candles) {
    if (!candles.length) return;
    const lo  = Math.min(...candles.map(c => c.l));
    const hi  = Math.max(...candles.map(c => c.h));
    const pad = (hi - lo) * 0.04;
    chart.updateOptions(
      { yaxis: { min: lo - pad, max: hi + pad, forceNiceScale: false, labels: yAxisLabels } },
      false, false
    );
  }

  const yMin = Math.min(...raw.map(c => c.l));
  const yMax = Math.max(...raw.map(c => c.h));
  const yPad = (yMax - yMin) * 0.04;

  function fmt(v)    { return '$' + v.toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmtAbs(v) { return '$' + Math.abs(v).toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

  function renderStats(c) {
    const chg       = c.c - c.o;
    const chgPct    = c.o !== 0 ? (chg / c.o) * 100 : 0;
    const rng       = c.h - c.l;
    const rngPct    = c.l !== 0 ? (rng / c.l) * 100 : 0;
    const cf        = c.cf || 0;
    const adjChg    = chg - cf;
    const adjChgPct = c.o !== 0 ? (adjChg / c.o) * 100 : 0;
    const sign      = chg >= 0 ? '+' : '-';
    const adjSign   = adjChg >= 0 ? '+' : '-';
    const cfSign    = cf >= 0 ? '+' : '-';
    const chgCol    = chg >= 0 ? 'var(--green)' : 'var(--red)';
    const adjCol    = adjChg >= 0 ? 'var(--green)' : 'var(--red)';
    const cfCol     = cf >= 0 ? 'var(--blue)' : 'var(--amber)';
    document.getElementById('ohlc-stats').innerHTML =
      `<span><span style="color:var(--muted)">O</span> <span style="color:var(--text)">${fmt(c.o)}</span></span>` +
      `<span><span style="color:var(--muted)">H</span> <span style="color:var(--green)">${fmt(c.h)}</span></span>` +
      `<span><span style="color:var(--muted)">L</span> <span style="color:var(--red)">${fmt(c.l)}</span></span>` +
      `<span><span style="color:var(--muted)">C</span> <span style="color:var(--text)">${fmt(c.c)}</span></span>` +
      `<span><span style="color:var(--muted)">Chg</span> <span style="color:${chgCol}">${sign}${fmtAbs(chg)} (${sign}${Math.abs(chgPct).toFixed(2)}%)</span></span>` +
      `<span><span style="color:var(--muted)">Range</span> <span style="color:var(--text)">${fmt(rng)} (${rngPct.toFixed(2)}%)</span></span>` +
      `<span><span style="color:var(--muted)">CF</span> <span style="color:${cfCol}">${cfSign}${fmtAbs(cf)}</span></span>` +
      `<span><span style="color:var(--muted)">Adj Chg</span> <span style="color:${adjCol}">${adjSign}${fmtAbs(adjChg)} (${adjSign}${Math.abs(adjChgPct).toFixed(2)}%)</span></span>`;
  }

  if (raw.length) renderStats(raw[raw.length - 1]);

  const series = [{ data: raw.map(c => ({ x: fmtLabel(c.x), y: [c.o, c.h, c.l, c.c] })) }];

  const opts = {
    chart: {
      type: 'candlestick',
      height: 280,
      background: 'transparent',
      foreColor: '#96b4d0',
      toolbar: { show: true, tools: { download: true, zoom: true, pan: true, reset: true } },
      zoom: { enabled: true },
      animations: { enabled: false },
      events: {
        dataPointMouseEnter: (_evt, _ctx, cfg) => {
          const idx = cfg.dataPointIndex;
          if (idx >= 0 && raw[idx]) renderStats(raw[idx]);
        },
        mouseLeave: () => { if (raw.length) renderStats(raw[raw.length - 1]); },
        zoomed: (_ctx, { xaxis }) => {
          if (!xaxis || xaxis.min == null) return;
          const lo = Math.max(0, Math.round(xaxis.min));
          const hi = Math.min(raw.length - 1, Math.round(xaxis.max));
          if (hi >= lo) fitY(raw.slice(lo, hi + 1));
        },
        scrolled: (_ctx, { xaxis }) => {
          if (!xaxis || xaxis.min == null) return;
          const lo = Math.max(0, Math.round(xaxis.min));
          const hi = Math.min(raw.length - 1, Math.round(xaxis.max));
          if (hi >= lo) fitY(raw.slice(lo, hi + 1));
        },
      },
    },
    theme: { mode: 'dark' },
    series,
    xaxis: {
      type: 'category',
      labels: {
        rotate: -45, rotateAlways: false, hideOverlappingLabels: true,
        style: { fontSize: '10px' },
      },
      tickAmount: Math.min(12, raw.length),
    },
    yaxis: { min: yMin - yPad, max: yMax + yPad, forceNiceScale: false, labels: yAxisLabels },
    plotOptions: {
      candlestick: {
        colors: { upward: '#00c855', downward: '#e83535' },
        wick: { useFillColor: true },
      },
    },
    grid: { borderColor: '#18253a' },
    tooltip: {
      theme: 'dark',
      custom: ({ dataPointIndex }) => {
        const c = raw[dataPointIndex];
        if (!c) return '';
        const chg       = c.c - c.o;
        const chgPct    = c.o !== 0 ? (chg / c.o) * 100 : 0;
        const rng       = c.h - c.l;
        const rngPct    = c.l !== 0 ? (rng / c.l) * 100 : 0;
        const cf        = c.cf || 0;
        const adjChg    = chg - cf;
        const adjChgPct = c.o !== 0 ? (adjChg / c.o) * 100 : 0;
        const sign      = chg >= 0 ? '+' : '-';
        const adjSign   = adjChg >= 0 ? '+' : '-';
        const cfSign    = cf >= 0 ? '+' : '-';
        const chgCol    = chg >= 0 ? '#00c855' : '#e83535';
        const adjCol    = adjChg >= 0 ? '#00c855' : '#e83535';
        const cfCol     = cf >= 0 ? '#3c8ff5' : '#e89020';
        const row = (label, val, col) =>
          `<div style="display:flex;justify-content:space-between;gap:16px">` +
          `<span style="color:#526a88">${label}</span>` +
          `<span style="color:${col || '#e8f2ff'}">${val}</span></div>`;
        return `<div style="padding:10px 12px;background:#0c1118;border:1px solid #18253a;font-size:11px;font-family:JetBrains Mono,monospace;line-height:1.9;min-width:200px">` +
          row('Open',  fmt(c.o)) +
          row('High',  fmt(c.h), '#00c855') +
          row('Low',   fmt(c.l), '#e83535') +
          row('Close', fmt(c.c)) +
          `<div style="border-top:1px solid #18253a;margin:4px 0"></div>` +
          row('Change',   `${sign}${fmtAbs(chg)} (${sign}${Math.abs(chgPct).toFixed(2)}%)`, chgCol) +
          row('Range',    `${fmt(rng)} (${rngPct.toFixed(2)}%)`) +
          `<div style="border-top:1px solid #18253a;margin:4px 0"></div>` +
          row('Cashflow', `${cfSign}${fmtAbs(cf)}`, cfCol) +
          row('Adj Chg',  `${adjSign}${fmtAbs(adjChg)} (${adjSign}${Math.abs(adjChgPct).toFixed(2)}%)`, adjCol) +
          `</div>`;
      },
    },
    dataLabels: { enabled: false },
  };

  const chart = new ApexCharts(document.querySelector('#ohlc-chart'), opts);
  chart.render();
})();
{% endif %}
</script>
