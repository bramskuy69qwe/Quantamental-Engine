<div id="ohlc-top" style="padding:10px 12px;display:flex;flex-direction:column;height:100%;box-sizing:border-box;">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:4px;flex-wrap:wrap;gap:4px;flex-shrink:0;">

    <!-- OHLC stats bar -->
    <div id="ohlc-stats"
         style="display:flex;flex-wrap:wrap;gap:6px 14px;font-size:.68rem;font-family:var(--font-mono);min-height:1.1rem;">
    </div>

    <!-- TF buttons -->
    <div style="display:flex;gap:3px;">
      {% for tf, label in [('1h','1H'),('4h','4H'),('1d','1D'),('1w','1W')] %}
      <button onclick="reloadOhlc('{{ tf }}')"
              id="ohlc-tf-{{ tf }}"
              class="preset-btn {{ 'active' if tf == active_tf else '' }}">{{ label }}</button>
      {% endfor %}
    </div>
  </div>

  {% if candles %}
  <div id="ohlc-chart" style="flex:1;min-height:0;"></div>
  {% else %}
  <div style="color:var(--sub);font-size:.78rem;padding:24px;text-align:center;flex:1;min-height:0;display:flex;align-items:center;justify-content:center;">No snapshot data yet.</div>
  {% endif %}
</div>

<script>
function reloadOhlc(tf) {
  htmx.ajax('GET', '/fragments/dashboard/equity_ohlc?tf=' + tf,
            { target: '#ohlc-top', swap: 'outerHTML' });
}

{% if candles %}
(function() {
  const raw = {{ candles | tojson }};
  const TF  = '{{ active_tf }}';

  function fmtLabel(ms) {
    const d  = new Date(ms);
    const mo = d.toLocaleString('en', { month: 'short' });
    const dd = String(d.getDate()).padStart(2, '0');
    if (TF === '1d' || TF === '1w') return mo + ' ' + dd;
    const hh = String(d.getHours()).padStart(2, '0');
    const mm = String(d.getMinutes()).padStart(2, '0');
    return mo + ' ' + dd + ' ' + hh + ':' + mm;
  }

  const yAxisFormatter = v => '$' + v.toLocaleString('en', { maximumFractionDigits: 2 });
  const yAxisLabels    = { formatter: yAxisFormatter, style: { fontSize: '10px' } };

  function fitY(candles) {
    if (!candles.length) return;
    const lo  = Math.min(...candles.map(c => c.l));
    const hi  = Math.max(...candles.map(c => c.h));
    const pad = (hi - lo) * 0.04;
    chart.updateOptions(
      { yaxis: { min: lo - pad, max: hi + pad, forceNiceScale: false, labels: yAxisLabels } },
      false, false
    );
  }

  const yMin = Math.min(...raw.map(c => c.l));
  const yMax = Math.max(...raw.map(c => c.h));
  const yPad = (yMax - yMin) * 0.04;

  function fmt(v)    { return '$' + v.toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }
  function fmtAbs(v) { return '$' + Math.abs(v).toLocaleString('en', { minimumFractionDigits: 2, maximumFractionDigits: 2 }); }

  function renderStats(c) {
    const chg    = c.c - c.o;
    const chgPct = c.o !== 0 ? (chg / c.o) * 100 : 0;
    const cf     = c.cf || 0;
    const sign   = chg >= 0 ? '+' : '-';
    const cfSign = cf >= 0 ? '+' : '-';
    const chgCol = chg >= 0 ? 'var(--green)' : 'var(--red)';
    const cfCol  = cf >= 0 ? 'var(--blue)' : 'var(--amber)';
    const sub    = 'var(--sub)', txt = 'var(--text)';
    document.getElementById('ohlc-stats').innerHTML =
      `<span><span style="color:${sub}">O</span> <span style="color:${txt}">${fmt(c.o)}</span></span>` +
      `<span><span style="color:${sub}">H</span> <span style="color:var(--green)">${fmt(c.h)}</span></span>` +
      `<span><span style="color:${sub}">L</span> <span style="color:var(--red)">${fmt(c.l)}</span></span>` +
      `<span><span style="color:${sub}">C</span> <span style="color:${txt}">${fmt(c.c)}</span></span>` +
      `<span><span style="color:${sub}">Chg</span> <span style="color:${chgCol}">${sign}${fmtAbs(chg)} (${sign}${Math.abs(chgPct).toFixed(2)}%)</span></span>` +
      `<span><span style="color:${sub}">CF</span> <span style="color:${cfCol}">${cfSign}${fmtAbs(cf)}</span></span>`;
  }

  if (raw.length) renderStats(raw[raw.length - 1]);

  const series = [{ data: raw.map(c => ({ x: fmtLabel(c.x), y: [c.o, c.h, c.l, c.c] })) }];

  const opts = {
    chart: {
      type: 'candlestick',
      height: '100%',
      background: 'transparent',
      foreColor: '#94a3b8',
      toolbar: { show: true, tools: { download: false, zoom: true, pan: true, reset: true } },
      zoom: { enabled: true },
      animations: { enabled: false },
      events: {
        dataPointMouseEnter: (_evt, _ctx, cfg) => {
          const idx = cfg.dataPointIndex;
          if (idx >= 0 && raw[idx]) renderStats(raw[idx]);
        },
        mouseLeave: () => { if (raw.length) renderStats(raw[raw.length - 1]); },
        zoomed: (_ctx, { xaxis }) => {
          if (!xaxis || xaxis.min == null) return;
          const lo = Math.max(0, Math.round(xaxis.min));
          const hi = Math.min(raw.length - 1, Math.round(xaxis.max));
          if (hi >= lo) fitY(raw.slice(lo, hi + 1));
        },
        scrolled: (_ctx, { xaxis }) => {
          if (!xaxis || xaxis.min == null) return;
          const lo = Math.max(0, Math.round(xaxis.min));
          const hi = Math.min(raw.length - 1, Math.round(xaxis.max));
          if (hi >= lo) fitY(raw.slice(lo, hi + 1));
        },
      },
    },
    theme: { mode: 'dark' },
    series,
    xaxis: {
      type: 'category',
      labels: {
        rotate: -45,
        rotateAlways: false,
        hideOverlappingLabels: true,
        style: { fontSize: '9px' },
      },
      tickAmount: Math.min(10, raw.length),
    },
    yaxis: {
      min: yMin - yPad,
      max: yMax + yPad,
      forceNiceScale: false,
      labels: yAxisLabels,
    },
    plotOptions: {
      candlestick: {
        colors: { upward: '#4ade80', downward: '#f87171' },
        wick: { useFillColor: true },
      },
    },
    grid: { borderColor: '#2a2d3a' },
    tooltip: {
      theme: 'dark',
      custom: ({ dataPointIndex }) => {
        const c = raw[dataPointIndex];
        if (!c) return '';
        const chg    = c.c - c.o;
        const chgPct = c.o !== 0 ? (chg / c.o) * 100 : 0;
        const cf     = c.cf || 0;
        const adjChg = chg - cf;
        const sign   = chg >= 0 ? '+' : '-';
        const cfSign = cf >= 0 ? '+' : '-';
        const chgCol = chg >= 0 ? '#4ade80' : '#f87171';
        const cfCol  = cf >= 0 ? '#60a5fa' : '#fb923c';
        const row    = (label, val, col) =>
          `<div style="display:flex;justify-content:space-between;gap:16px">` +
          `<span style="color:#64748b">${label}</span>` +
          `<span style="color:${col || '#cbd5e1'}">${val}</span></div>`;
        return `<div style="padding:8px 10px;background:#1e2130;border:1px solid #2a2d3a;font-size:11px;font-family:monospace;line-height:1.8;min-width:180px">` +
          row('O', fmt(c.o)) + row('H', fmt(c.h), '#4ade80') + row('L', fmt(c.l), '#f87171') + row('C', fmt(c.c)) +
          `<div style="border-top:1px solid #2a2d3a;margin:3px 0"></div>` +
          row('Chg', `${sign}${fmtAbs(chg)} (${sign}${Math.abs(chgPct).toFixed(2)}%)`, chgCol) +
          row('CF', `${cfSign}${fmtAbs(cf)}`, cfCol) +
          `</div>`;
      },
    },
    dataLabels: { enabled: false },
  };

  const chart = new ApexCharts(document.querySelector('#ohlc-chart'), opts);
  chart.render();
})();
{% endif %}
</script>
